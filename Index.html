function LiveMap({ businesses, activeCity, onSelect }) {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  useEffect(() => {
    if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; }
    if (!mapRef.current || !window.L) return;
    const L = window.L;
    const ctr = CITY_CENTERS[activeCity] || CITY_CENTERS.Cleveland;
    const map = L.map(mapRef.current, { center: [ctr.lat, ctr.lng], zoom: 12, zoomControl: true, attributionControl: false });
    mapInst.current = map;
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(map);
    businesses.forEach((biz) => {
      if (!biz.lat || !biz.lng) return;
      const icon = L.divIcon({ className: "", html: '<div class="bo-pin' + (biz.featured ? " featured" : "") + '"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
      L.marker([biz.lat, biz.lng], { icon }).addTo(map).bindPopup(
        '<div style="font-family:\'Barlow Condensed\',sans-serif">' +
        '<div style="font-family:\'Cormorant Garamond\',serif;font-size:14px;font-weight:700;color:#F5F5F5;margin-bottom:2px">' + biz.name + "</div>" +
        '<div style="font-size:10px;color:#888;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px">' + biz.category + " · " + biz.neighborhood + "</div>" +
        (biz.deal ? '<div style="font-size:10px;color:#C9A84C;font-weight:700;margin-bottom:4px">🔥 ' + biz.deal + "</div>" : "") +
        '<div style="font-size:10px;color:' + (biz.open ? "#4CAF82" : "#C0392B") + ';font-weight:700;margin-bottom:8px">' + (biz.open ? "OPEN" : "CLOSED") + "</div>" +
        '<span onclick="window.__boSel(' + biz.id + ')" style="background:#C9A84C;color:#0A0A0A;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:1px;cursor:pointer">View Profile</span>' +
        "</div>",
        { closeButton: false }
      );
    });
    window.__boSel = (id) => { const b = businesses.find((x) => x.id === id); if (b) onSelect(b); };
    return () => { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; } delete window.__boSel; };
  }, [businesses, activeCity]);
  return <div ref={mapRef} style={{ width: "100%", height: "100%" }} />;
}

            <button onClick={() => setView("discovery")} className="bc" style={{ background: "transparent", border: "none", color: C.grayMid, fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", cursor: "pointer", padding: "0 0 16px", display: "flex", alignItems: "center", gap: 5 }}>← Directory</button>
            <div className="cg" style={{ fontSize: 22, fontWeight: 700, color: C.white, marginBottom: 3 }}>Admin Dashboard</div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 7, marginBottom: 18 }}>
              {[{ label: "Approved", val: bizList.filter((b) => b.approvalStatus === "approved").length, color: C.green },{ label: "Pending", val: bizList.filter((b) => b.approvalStatus === "pending").length, color: "#F0A500" },{ label: "Verified", val: bizList.filter((b) => b.verified).length, color: C.gold },{ label: "Total", val: bizList.length, color: C.white }].map((s) => <div key={s.label} style={{ background: C.blackCard, border: "1px solid " + C.blackBorder, borderRadius: 2, padding: "9px 11px", textAlign: "center" }}><div className="cg" style={{ fontSize: 24, fontWeight: 700, color: s.color }}>{s.val}</div><div className="bc" style={{ fontSize: 9, color: "#555", letterSpacing: "0.13em", fontWeight: 700, textTransform: "uppercase" }}>{s.label}</div></div>)}

                      <Btn label="View" small ghost onClick={() => setAdminPreview(biz)} />

                      {biz.approvalStatus === "approved" && <Btn label={biz.featured ? "Unfeature" : "Feature"} small ghost onClick={() => toggleFeatured(biz.id)} />}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    );
  };

  const InvestorView = () => (
    <div style={{ maxWidth: 800, margin: "0 auto", padding: "22px 13px 60px", animation: "slideUp 0.3s ease" }}>
      <button onClick={() => setView("discovery")} className="bc" style={{ background: "transparent", border: "none", color: C.grayMid, fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", cursor: "pointer", padding: "0 0 16px", display: "flex", alignItems: "center", gap: 5 }}>← Back</button>
      <div className="bc" style={{ fontSize: 9, color: C.gold, letterSpacing: "0.2em", fontWeight: 700, marginBottom: 5 }}>PLATFORM OVERVIEW</div>
      <div className="cg" style={{ fontSize: 26, fontWeight: 700, color: C.white, lineHeight: 1.15, marginBottom: 7 }}>The Cultural Commerce<br />Infrastructure for Black Business</div>
      <div className="bc" style={{ fontSize: 13, color: C.grayMid, lineHeight: 1.7, letterSpacing: "0.02em", marginBottom: 24 }}>Blacc Ownd is not a directory. It is a curated, verified, hyperlocal discovery engine built to redirect Black spending power into Black businesses — neighborhood by neighborhood, city by city.</div>
      <div style={{ background: C.blackCard, border: "1px solid " + C.blackBorder, borderRadius: 3, padding: "16px 18px", marginBottom: 20 }}>
        <div className="bc" style={{ fontSize: 9, color: C.red, letterSpacing: "0.2em", fontWeight: 700, textTransform: "uppercase", marginBottom: 9 }}>The Problem</div>
        {[{ stat: "$1.6T", desc: "Annual Black consumer spending in the U.S., with estimates suggesting less than 3% recirculates within Black communities before leaving." },{ stat: "Fragmented", desc: "Discovery. No single trusted local platform connects Black consumers to verified Black businesses in their own neighborhoods." },{ stat: "Zero", desc: "Existing platforms combine verification, neighborhood dominance, loyalty, and deal conversion in one product — until now." }].map((p) => <div key={p.stat} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 11, paddingBottom: 11, borderBottom: "1px solid #1a1a1a" }}><div className="cg" style={{ fontSize: 20, fontWeight: 700, color: C.white, minWidth: 80, flexShrink: 0 }}>{p.stat}</div><div className="bc" style={{ fontSize: 12, color: C.grayMid, lineHeight: 1.6, letterSpacing: "0.02em", paddingTop: 2 }}>{p.desc}</div></div>)}
        <div style={{ borderTop: "1px solid " + C.goldBorder, paddingTop: 11 }}><div className="cg" style={{ fontSize: 15, color: C.gold, fontStyle: "italic" }}>Blacc Ownd captures intent that already exists. People want to buy Black — they cannot find where to go.</div></div>
      </div>
      <div style={{ background: C.goldDim, border: "1px solid " + C.goldBorder, borderRadius: 3, padding: "14px 18px", marginBottom: 20 }}>
        <div className="bc" style={{ fontSize: 9, color: C.gold, letterSpacing: "0.2em", fontWeight: 700, textTransform: "uppercase", marginBottom: 5 }}>The Moat Strategy</div>
        <div className="cg" style={{ fontSize: 17, fontWeight: 600, color: C.white, marginBottom: 5 }}>We do not expand by city. We dominate by neighborhood.</div>
        <div className="bc" style={{ fontSize: 12, color: C.grayMid, lineHeight: 1.65, letterSpacing: "0.02em" }}>Own Glenville before claiming Cleveland. Own Highland Square before claiming Akron. Most complete, most verified, most trusted in one area — then expand.</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 7, marginBottom: 20 }}>
        {[{ label: "Total Listings", val: "120*", sub: "Cleveland + Expansion Cities" },{ label: "Verified Businesses", val: "89*", sub: "Personally confirmed Black-owned" },{ label: "Active Deals", val: "34*", sub: "Driving measurable traffic" },{ label: "Partner Inquiries", val: "47*", sub: "Businesses already interested" },{ label: "Launch Cities Ready", val: "5", sub: "Akron · Columbus · Cincy · Toledo" },{ label: "Featured Slots Open", val: "3", sub: "Revenue-generating placements" }].map((s) => <div key={s.label} style={{ background: C.blackCard, border: "1px solid " + C.blackBorder, borderRadius: 2, padding: "13px 15px" }}><div className="cg" style={{ fontSize: 30, fontWeight: 700, color: C.gold, lineHeight: 1 }}>{s.val}</div><div className="bc" style={{ fontSize: 12, fontWeight: 700, color: C.white, marginTop: 3, letterSpacing: "0.02em" }}>{s.label}</div><div className="bc" style={{ fontSize: 10, color: "#555", marginTop: 2, letterSpacing: "0.02em" }}>{s.sub}</div></div>)}
      </div>
      <div style={{ background: C.goldDim, border: "1px solid " + C.goldBorder, borderRadius: 3, padding: "16px 20px", textAlign: "center" }}>
        <div className="cg" style={{ fontSize: 17, fontWeight: 600, color: C.gold, marginBottom: 4 }}>Cleveland First. Then Everywhere.</div>
        <div className="bc" style={{ fontSize: 12, color: C.grayMid, lineHeight: 1.6, letterSpacing: "0.02em" }}>One neighborhood at a time. Most complete, most verified, most trusted — then expand.</div>
      </div>
    </div>
  );

  return (
    <div style={{ fontFamily: "'Cormorant Garamond',Georgia,serif", background: C.black, minHeight: "100vh", color: C.white }}>
      <style>{GS}</style>
      <Nav />
      {view === "discovery" && <DiscoveryView />}
      {view === "profile" && <ProfileView />}
      {view === "submit" && <SubmitView />}
      {view === "admin" && <AdminView />}
      {view === "investor" && <InvestorView />}
    </div>
  );
}
